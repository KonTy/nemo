name: Build Debian Package

on:
  push:
    branches:
      - release
  pull_request:
    branches:
      - release
  workflow_dispatch:

jobs:
  debian-build:
    runs-on: ubuntu-latest
    container:
      # LMDE 7 (Debian-based) — has Linux Mint repos pre-configured,
      # so all Cinnamon/xapp/nemo build-deps are available out of the box.
      image: linuxmintd/lmde7-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential devscripts debhelper dh-python equivs \
            meson ninja-build pkgconf intltool itstool \
            libgtk-3-dev libglib2.0-dev libjson-glib-dev \
            libx11-dev libxapp-dev libcinnamon-desktop-dev \
            libexif-dev libexempi-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev libgsf-1-dev \
            gobject-introspection libgirepository1.0-dev \
            gtk-doc-tools cinnamon-l10n libgtk-layer-shell-dev \
            libpango1.0-dev libatk1.0-dev libgail-3-dev \
            libxext-dev libxrender-dev libwayland-dev \
            python3 python3-gi x11proto-dev

      - name: Build Debian package
        run: |
          VERSION=$(grep -Po "version\s*:\s*'\K[^']+" meson.build | head -n1)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          dpkg-buildpackage -us -uc -b

          # Only keep the packages users actually need to install.
          # Skip -dev, -dbg, gir, and lib split packages.
          mkdir -p debian-build
          cp ../nemo_*.deb    debian-build/ || true
          cp ../nemo-data_*.deb debian-build/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nemo-smpl-debian
          path: debian-build/*.deb
          retention-days: 14

      - name: Add to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/release'
        uses: softprops/action-gh-release@v1
        with:
          files: debian-build/*.deb
          tag_name: v${{ env.VERSION }}
          name: nemo-smpl ${{ env.VERSION }}
          body: |
            Automated build from release branch
            - Version: ${{ env.VERSION }}
            - Built from: release branch (LMDE 7)
            - Contains all latest features and fixes
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
