name: Build Debian Package

on:
  push:
    branches:
      - release
  pull_request:
    branches:
      - release
  workflow_dispatch:

jobs:
  debian-build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl gnupg ca-certificates

          # Add Linux Mint repo for Cinnamon-specific packages
          echo "deb http://packages.linuxmint.com faye main" \
            > /etc/apt/sources.list.d/mint.list
          curl -fsSL https://linuxmint.github.io/keys/linuxmint-keyring.gpg \
            > /etc/apt/trusted.gpg.d/linuxmint-keyring.gpg
          apt-get update -qq

          apt-get install -y --no-install-recommends \
            build-essential devscripts debhelper-compat dh-python \
            git meson ninja-build pkgconf intltool itstool \
            libgtk-3-dev libglib2.0-dev libjson-glib-dev \
            libx11-dev libxapp-dev libcinnamon-desktop-dev \
            libexif-dev libexempi-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev libgsf-1-dev \
            gobject-introspection libgirepository1.0-dev \
            gtk-doc-tools cinnamon-l10n libgtk-layer-shell-dev \
            libpango1.0-dev libatk1.0-dev libgail-3-dev \
            libxext-dev libxrender-dev libwayland-dev \
            python3 python3-gi x11proto-core-dev \
            libglib2.0-doc libgtk-3-doc

      - name: Build Debian package
        run: |
          # Extract version
          VERSION=$(grep -Po "version\s*:\s*'\K[^']+" meson.build | head -n1)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          
          # Build directly in source tree
          dpkg-buildpackage -us -uc -b
          
          # Move debs to a results directory
          mkdir -p debian-build
          mv ../*.deb debian-build/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nemo-smpl-debian
          path: debian-build/*.deb
          retention-days: 14

      - name: Add to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/release'
        uses: softprops/action-gh-release@v1
        with:
          files: debian-build/*.deb
          tag_name: v${{ env.VERSION }}
          name: smplos-nemo ${{ env.VERSION }}
          body: |
            Automated build from release branch
            - Version: ${{ env.VERSION }}
            - Built from: release branch (Debian bookworm)
            - Contains all latest features and fixes
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
